<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopi Smart Glasses — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Three.js Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 720px;
            padding: 2rem;
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2.5rem;
            letter-spacing: 0.5px;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            background: #f97316;
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Heading */
        .heading {
            font-size: clamp(3rem, 8vw, 6.5rem);
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 1.5rem;
            letter-spacing: -2px;
            background: linear-gradient(
                180deg,
                #ffffff 0%,
                rgba(255, 255, 255, 0.7) 50%,
                rgba(255, 165, 0, 0.6) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subheading {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            line-height: 1.6;
            margin-bottom: 3rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Form Card */
        .form-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
        }

        .form-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .form-subtitle {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 1.8rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 6px;
            transition: border-color 0.3s ease;
        }

        .input-group:focus-within {
            border-color: rgba(249, 115, 22, 0.5);
        }

        .input-group input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1rem;
            padding: 14px 16px;
            font-family: inherit;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-join {
            background: #fff;
            color: #000;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-join:hover {
            background: #f97316;
            color: #fff;
            transform: scale(1.03);
        }

        /* Success message */
        .success-msg {
            display: none;
            color: #4ade80;
            font-size: 0.95rem;
            margin-top: 1rem;
            font-weight: 500;
        }

        .success-msg.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Social Links */
        .socials {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .social-link {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.25);
        }

        .social-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
                gap: 0;
            }
            .btn-join {
                width: 100%;
                margin-top: 4px;
            }
            .form-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="content">
        <div class="badge">
            <span class="badge-dot"></span>
            Waitlist
        </div>

        <h1 class="heading">Coming soon!</h1>

        <p class="subheading">
            Loopi Smart Glasses — the next generation of wearable tech.
            Sign up to be the first to know.
        </p>

        <div class="form-card">
            <h2 class="form-title">Join our waitlist!</h2>
            <p class="form-subtitle">
                Sign up to receive the latest updates and be first in line.
            </p>
            <form id="waitlist-form">
                <div class="input-group">
                    <input type="email" placeholder="Enter email" required id="email-input">
                    <button type="submit" class="btn-join">Join Waitlist</button>
                </div>
                <p class="success-msg" id="success-msg">
                    You're on the list! We'll be in touch soon.
                </p>
            </form>
        </div>

        <div class="socials">
            <a href="#" class="social-link" aria-label="X / Twitter">
                <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
            <a href="#" class="social-link" aria-label="Facebook">
                <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </a>
            <a href="#" class="social-link" aria-label="Instagram">
                <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
            </a>
        </div>
    </div>

    <!-- WebGL Shader Background — Meta/Apple style aurora -->
    <script>
        // === FULL-SCREEN FRAGMENT SHADER BACKGROUND ===
        const canvas = document.getElementById('bg-canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

        function resize() {
            const dpr = Math.min(window.devicePixelRatio, 2);
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        resize();
        window.addEventListener('resize', resize);

        // Vertex shader — full screen quad
        const vsSource = `
            attribute vec2 position;
            void main() {
                gl_Position = vec4(position, 0.0, 1.0);
            }
        `;

        // Fragment shader — premium aurora/nebula with light ribbons
        const fsSource = `
            precision highp float;
            uniform float uTime;
            uniform vec2 uResolution;
            uniform vec2 uMouse;

            #define PI 3.14159265359

            // Simplex-style noise
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec3 permute(vec3 x) { return mod289(((x * 34.0) + 1.0) * x); }

            float snoise(vec2 v) {
                const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                                   -0.577350269189626, 0.024390243902439);
                vec2 i = floor(v + dot(v, C.yy));
                vec2 x0 = v - i + dot(i, C.xx);
                vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                vec4 x12 = x0.xyxy + C.xxzz;
                x12.xy -= i1;
                i = mod289(i);
                vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
                vec3 m = max(0.5 - vec3(dot(x0, x0), dot(x12.xy, x12.xy), dot(x12.zw, x12.zw)), 0.0);
                m = m * m;
                m = m * m;
                vec3 x = 2.0 * fract(p * C.www) - 1.0;
                vec3 h = abs(x) - 0.5;
                vec3 ox = floor(x + 0.5);
                vec3 a0 = x - ox;
                m *= 1.79284291400159 - 0.85373472095314 * (a0 * a0 + h * h);
                vec3 g;
                g.x = a0.x * x0.x + h.x * x0.y;
                g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                return 130.0 * dot(m, g);
            }

            // Fractal Brownian Motion
            float fbm(vec2 p) {
                float value = 0.0;
                float amplitude = 0.5;
                float frequency = 1.0;
                for (int i = 0; i < 6; i++) {
                    value += amplitude * snoise(p * frequency);
                    frequency *= 2.0;
                    amplitude *= 0.5;
                }
                return value;
            }

            // Domain warping for organic flow
            float warpedFbm(vec2 p, float t) {
                vec2 q = vec2(
                    fbm(p + vec2(0.0, 0.0) + 0.15 * t),
                    fbm(p + vec2(5.2, 1.3) + 0.12 * t)
                );
                vec2 r = vec2(
                    fbm(p + 4.0 * q + vec2(1.7, 9.2) + 0.1 * t),
                    fbm(p + 4.0 * q + vec2(8.3, 2.8) + 0.08 * t)
                );
                return fbm(p + 4.0 * r);
            }

            // Light ribbon function
            float ribbon(vec2 uv, float t, float offset, float freq, float width) {
                float wave = sin(uv.x * freq + t + offset) * 0.3
                           + sin(uv.x * freq * 1.7 + t * 0.7 + offset) * 0.15
                           + snoise(vec2(uv.x * 2.0 + t * 0.3, offset)) * 0.15;
                float dist = abs(uv.y - wave);
                return smoothstep(width, 0.0, dist);
            }

            void main() {
                vec2 uv = gl_FragCoord.xy / uResolution.xy;
                vec2 p = (gl_FragCoord.xy - 0.5 * uResolution.xy) / uResolution.y;
                float t = uTime * 0.4;

                // Base: deep black with subtle noise
                vec3 color = vec3(0.0);

                // Domain-warped nebula (very subtle, deep background)
                float nebula = warpedFbm(p * 1.5, t * 0.5);
                nebula = nebula * 0.5 + 0.5;

                // Nebula colors — warm amber/orange tones
                vec3 nebulaColor1 = vec3(0.976, 0.451, 0.086); // #F97316 orange
                vec3 nebulaColor2 = vec3(0.984, 0.749, 0.141); // #FBBF24 amber
                vec3 nebulaColor3 = vec3(0.545, 0.361, 0.965); // #8B5CF6 purple
                vec3 nebulaColor4 = vec3(0.937, 0.267, 0.267); // red accent

                vec3 nebulaMix = mix(nebulaColor1, nebulaColor2, nebula);
                nebulaMix = mix(nebulaMix, nebulaColor3, smoothstep(0.4, 0.8, nebula) * 0.4);

                // Apply nebula very subtly
                color += nebulaMix * pow(nebula, 3.0) * 0.12;

                // Light ribbons — flowing across screen
                float r1 = ribbon(p, t * 1.2, 0.0, 3.0, 0.06);
                float r2 = ribbon(p, t * 0.9, 2.0, 2.5, 0.04);
                float r3 = ribbon(p, t * 1.5, 4.5, 4.0, 0.03);
                float r4 = ribbon(p, t * 0.7, 7.0, 2.0, 0.08);

                // Ribbon colors with glow
                color += nebulaColor1 * r1 * 0.5;
                color += nebulaColor2 * r2 * 0.4;
                color += nebulaColor3 * r3 * 0.35;
                color += mix(nebulaColor1, nebulaColor2, 0.5) * r4 * 0.2;

                // Soft glow around ribbons
                float glow1 = ribbon(p, t * 1.2, 0.0, 3.0, 0.25);
                float glow2 = ribbon(p, t * 0.9, 2.0, 2.5, 0.2);
                color += nebulaColor1 * glow1 * 0.06;
                color += nebulaColor2 * glow2 * 0.05;

                // Central radial glow (draws eye to center)
                float centerGlow = 1.0 - length(p * vec2(1.2, 1.8));
                centerGlow = pow(max(centerGlow, 0.0), 2.5);
                color += vec3(0.976, 0.549, 0.186) * centerGlow * 0.08;

                // Subtle mouse interaction
                vec2 mouseP = (uMouse - 0.5) * 2.0;
                float mouseDist = length(p - mouseP * 0.5);
                float mouseGlow = exp(-mouseDist * mouseDist * 3.0) * 0.04;
                color += nebulaColor2 * mouseGlow;

                // Vignette
                float vignette = 1.0 - pow(length(uv - 0.5) * 1.3, 2.5);
                color *= vignette;

                // Subtle film grain for premium feel
                float grain = (fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453) - 0.5) * 0.015;
                color += grain;

                // Tone mapping
                color = color / (1.0 + color);
                color = pow(color, vec3(0.95));

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        // Compile shaders
        function createShader(type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vs = createShader(gl.VERTEX_SHADER, vsSource);
        const fs = createShader(gl.FRAGMENT_SHADER, fsSource);

        const program = gl.createProgram();
        gl.attachShader(program, vs);
        gl.attachShader(program, fs);
        gl.linkProgram(program);
        gl.useProgram(program);

        // Full-screen quad
        const vertices = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

        const posLoc = gl.getAttribLocation(program, 'position');
        gl.enableVertexAttribArray(posLoc);
        gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

        // Uniforms
        const uTime = gl.getUniformLocation(program, 'uTime');
        const uResolution = gl.getUniformLocation(program, 'uResolution');
        const uMouse = gl.getUniformLocation(program, 'uMouse');

        let mouseX = 0.5, mouseY = 0.5;
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX / window.innerWidth;
            mouseY = 1.0 - e.clientY / window.innerHeight;
        });

        // Animation loop
        const startTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            const time = (performance.now() - startTime) * 0.001;

            gl.uniform1f(uTime, time);
            gl.uniform2f(uResolution, canvas.width, canvas.height);
            gl.uniform2f(uMouse, mouseX, mouseY);

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }

        animate();

        // === FORM HANDLER ===
        document.getElementById('waitlist-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email-input').value;

            // TODO: Replace with your actual API endpoint
            console.log('Waitlist signup:', email);

            document.getElementById('email-input').value = '';
            document.getElementById('success-msg').classList.add('show');

            setTimeout(() => {
                document.getElementById('success-msg').classList.remove('show');
            }, 4000);
        });
    </script>
</body>
</html>
