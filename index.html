<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopi Smart Glasses — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #e8e8ee;
            color: #1a1a1a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Side decorative symbols */
        .side-symbol {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 2000px;
            height: auto;
            opacity: 0.25;
            z-index: 0;
            pointer-events: none;
            animation: symbolShift 8s ease-in-out infinite;
        }
        .side-symbol-left {
            left: -1000px;
        }
        .side-symbol-right {
            right: -1000px;
            transform: translateY(-50%) scaleX(-1);
        }
        .side-symbol svg {
            width: 100%;
            height: auto;
        }
        @keyframes symbolShift {
            0%, 100% { opacity: 0.25; transform: translateY(-50%) scale(1); }
            50% { opacity: 0.18; transform: translateY(-52%) scale(1.02); }
        }

        /* Ambient orbs */
        .ambient {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.10;
            will-change: transform;
        }
        .orb-1 {
            width: 600px; height: 600px;
            background: #7E57A0;
            top: -10%; right: -5%;
            animation: f1 25s ease-in-out infinite;
        }
        .orb-2 {
            width: 500px; height: 500px;
            background: #B48ED2;
            bottom: -15%; left: -10%;
            animation: f2 30s ease-in-out infinite;
        }
        .orb-3 {
            width: 400px; height: 400px;
            background: #D4BEE4;
            top: 50%; left: 50%;
            opacity: 0.06;
            animation: f3 20s ease-in-out infinite;
        }
        @keyframes f1 {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(-80px,60px) scale(1.1); }
            66% { transform: translate(40px,-40px) scale(0.95); }
        }
        @keyframes f2 {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(70px,-50px) scale(1.05); }
            66% { transform: translate(-50px,30px) scale(0.9); }
        }
        @keyframes f3 {
            0%,100% { transform: translate(-50%,0) scale(1); }
            50% { transform: translate(-50%,-60px) scale(1.15); }
        }

        /* Layout */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 2rem 1.5rem;
        }

        /* Top section */
        .top {
            text-align: center;
            max-width: 600px;
            animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
            opacity: 0;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Staggered reveal for children */
        .top .badge { animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.1s forwards; opacity: 0; }
        .top .heading { animation: headingReveal 1.2s cubic-bezier(0.16,1,0.3,1) 0.25s forwards; opacity: 0; }
        .top .subheading { animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards; opacity: 0; }
        .top .form-wrapper { animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.7s forwards; opacity: 0; }

        @keyframes headingReveal {
            from { opacity: 0; transform: translateY(40px) scale(0.92); filter: blur(8px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .logo {
            width: clamp(140px, 25vw, 200px);
            height: auto;
            margin-bottom: 0.6rem;
        }
        .tagline {
            font-size: clamp(1rem, 2.2vw, 1.2rem);
            font-style: italic;
            font-weight: 400;
            background: linear-gradient(135deg, #C3ADE4, #CDB07E, #9C7E45);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #e8e8ee;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500;
            color: #888;
            letter-spacing: 0.5px;
            margin-bottom: 1.5rem;
            box-shadow: 6px 6px 14px rgba(0,0,0,0.08), -6px -6px 14px rgba(255,255,255,0.9);
        }
        .badge-dot {
            width: 6px; height: 6px;
            background: #7E57A0;
            border-radius: 50%;
            animation: pulse 2.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .heading {
            font-size: clamp(2.2rem, 5vw, 3.2rem);
            font-weight: 900;
            letter-spacing: -1.5px;
            color: #1a1a1a;
            margin-bottom: 0.75rem;
            line-height: 1.1;
        }
        .word {
            display: inline-block;
            opacity: 0;
            animation: wordReveal 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        @keyframes wordReveal {
            from { opacity: 0; transform: translateY(30px) rotateX(40deg); filter: blur(6px); }
            to { opacity: 1; transform: translateY(0) rotateX(0); filter: blur(0); }
        }
        .loopi-text {
            color: #7E57A0;
        }
        .loopi-text.gradient-active {
            background: linear-gradient(90deg, #C3ADE4, #7E57A0, #CDB07E, #9C7E45, #C3ADE4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 400% 100%;
            animation: logoGrad 6s linear infinite;
            opacity: 1 !important;
            transform: none !important;
            filter: none !important;
        }
        @keyframes logoGrad {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }
        .subheading {
            font-size: clamp(0.95rem, 1.8vw, 1.05rem);
            color: #999;
            font-weight: 400;
            line-height: 1.7;
            margin-bottom: 1rem;
        }
        .subheading .char {
            display: inline-block;
            opacity: 0;
            animation: charReveal 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        @keyframes charReveal {
            from { opacity: 0; transform: translateY(10px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* Form */
        .form-wrapper { max-width: 420px; width: 100%; margin-bottom: 0.5rem; }
        .input-group {
            display: flex;
            align-items: center;
            background: #e8e8ee;
            border: none;
            border-radius: 16px;
            padding: 5px;
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.06), inset -4px -4px 8px rgba(255,255,255,0.8);
        }
        .input-group:focus-within {
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.08), inset -4px -4px 8px rgba(255,255,255,0.8),
                        0 0 0 3px rgba(126,87,160,0.12);
        }
        .input-group input {
            flex: 1;
            background: none; border: none; outline: none;
            color: #1a1a1a;
            font-size: 0.9rem;
            padding: 13px 16px;
            font-family: inherit;
        }
        .input-group input::placeholder { color: #bbb; }
        .btn-join {
            background: linear-gradient(135deg, #9B6FC0, #7E57A0, #6B4589);
            color: #fff; border: none;
            padding: 14px 26px; border-radius: 12px;
            font-size: 0.85rem; font-weight: 600;
            cursor: pointer; font-family: inherit;
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(126,87,160,0.3),
                        inset 0 1px 0 rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }
        .btn-join::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.6s ease;
        }
        .btn-join:hover::before { left: 100%; }
        .btn-join:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 12px 30px rgba(126,87,160,0.35),
                        inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .btn-join:active { transform: translateY(0) scale(0.98); }
        .success-msg {
            display: none; color: #7E57A0;
            font-size: 0.85rem; margin-top: 0.8rem; font-weight: 500;
        }
        .success-msg.show { display: block; animation: fadeUp 0.4s ease; }
        .waitlist-count {
            font-size: 0.8rem; color: #bbb; margin-top: 0.8rem;
        }
        .waitlist-count span { color: #888; font-weight: 600; }

        /* ======= 3D CAROUSEL ======= */
        .carousel-section {
            width: 100%;
            margin: 0 0 1.5rem;
            animation: carouselReveal 1.4s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
            opacity: 0;
        }
        @keyframes carouselReveal {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .carousel-3d {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 360px;
            margin: 0 auto;
            perspective: 1200px;
            user-select: none;
            cursor: grab;
        }
        .carousel-3d:active { cursor: grabbing; }

        .carousel-scene {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .carousel-item {
            position: absolute;
            width: 450px;
            height: 340px;
            left: 50%;
            top: 50%;
            margin-left: -225px;
            margin-top: -170px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .carousel-item img {
            width: 100%;
            max-width: 420px;
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.08));
            transition: all 0.9s cubic-bezier(0.16,1,0.3,1);
            pointer-events: none;
            transform: scale(0.9);
        }

        .carousel-item.active img {
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.15));
            transform: scale(1.12);
            transition: all 0.9s cubic-bezier(0.16,1,0.3,1);
        }

        /* Reflection */
        .carousel-item::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: 10%;
            width: 80%;
            height: 40px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.06) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* Color label */
        .carousel-label {
            text-align: center;
            margin-top: 0;
        }
        .color-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a1a1a;
            transition: all 0.4s ease;
            letter-spacing: -0.3px;
        }
        .color-desc {
            font-size: 0.8rem;
            color: #bbb;
            margin-top: 0.25rem;
        }

        /* Color swatches */
        .swatches {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 0.8rem;
        }
        .swatch {
            width: 30px; height: 30px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
            padding: 0;
            position: relative;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.1), -3px -3px 8px rgba(255,255,255,0.8),
                        inset 0 1px 2px rgba(255,255,255,0.3);
        }
        .swatch::after {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .swatch:hover { transform: scale(1.1); }
        .swatch:hover::after { border-color: #ccc; }
        .swatch.active { transform: scale(1.15); }
        .swatch.active::after { border-color: #7E57A0; }

        .swatch-cognac { background: linear-gradient(135deg, #C47A2A, #A0612A); }
        .swatch-lilac { background: linear-gradient(135deg, #B48ED2, #9B6FC0); }
        .swatch-onyx { background: linear-gradient(135deg, #3A3A3A, #1a1a1a); }
        .swatch-tortoise { background: linear-gradient(135deg, #8B6914, #6B5010); }

        /* Nav arrows */
        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 46px; height: 46px;
            border-radius: 50%;
            border: none;
            background: #e8e8ee;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
            z-index: 10;
            color: #888;
            box-shadow: 5px 5px 12px rgba(0,0,0,0.08), -5px -5px 12px rgba(255,255,255,0.9);
        }
        .carousel-nav:hover {
            color: #7E57A0;
            box-shadow: 6px 6px 16px rgba(0,0,0,0.1), -6px -6px 16px rgba(255,255,255,0.95);
            transform: translateY(-50%) scale(1.05);
        }
        .carousel-nav:active {
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.08), inset -3px -3px 6px rgba(255,255,255,0.8);
        }
        .carousel-nav svg {
            width: 16px; height: 16px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }
        .nav-prev { left: 0; }
        .nav-next { right: 0; }

        /* Bottom */
        .divider {
            width: 40px; height: 1px;
            background: #e8e8e8;
            margin: 1.5rem auto;
        }
        .socials {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
        }
        .social-link {
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            color: #aaa;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
            background: #e8e8ee;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.07), -4px -4px 10px rgba(255,255,255,0.85);
        }
        .social-link:hover {
            color: #7E57A0;
            transform: translateY(-2px);
            box-shadow: 6px 6px 14px rgba(0,0,0,0.09), -6px -6px 14px rgba(255,255,255,0.9);
        }
        .social-link svg { width: 17px; height: 17px; fill: currentColor; }

        .footer-text {
            font-size: 0.75rem;
            color: #ddd;
            margin-top: auto;
            padding-bottom: 1.5rem;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .page { padding: 2rem 1.5rem 1.5rem; }
            .carousel-3d { height: 280px; }
            .carousel-item { width: 260px; margin-left: -130px; }
            .carousel-item img { max-width: 240px; }
            .carousel-nav { display: none; }
            .input-group { flex-direction: column; }
            .btn-join { width: 100%; margin-top: 4px; }
        }
    </style>
</head>
<body>
    <div class="side-symbol side-symbol-left">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" width="200" height="130">
            <defs>
                <linearGradient id="gl" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
                    <stop offset="0%" stop-color="#C3ADE4"><animate attributeName="stop-color" values="#C3ADE4;#CDB07E;#9C7E45;#7E57A0;#C3ADE4" dur="6s" repeatCount="indefinite"/></stop>
                    <stop offset="50%" stop-color="#CDB07E"><animate attributeName="stop-color" values="#CDB07E;#9C7E45;#C3ADE4;#CDB07E;#CDB07E" dur="6s" repeatCount="indefinite"/></stop>
                    <stop offset="100%" stop-color="#9C7E45"><animate attributeName="stop-color" values="#9C7E45;#7E57A0;#CDB07E;#C3ADE4;#9C7E45" dur="6s" repeatCount="indefinite"/></stop>
                </linearGradient>
            </defs>
            <!-- Favicon sbiadito statico -->
            <path d="M 80 50 C 80 26, 56 14, 36 14 C 16 14, 6 30, 6 50 C 6 70, 16 86, 36 86 C 56 86, 80 74, 80 50 C 80 26, 104 14, 124 14 C 144 14, 154 30, 154 50 C 154 70, 144 86, 124 86 C 104 86, 80 74, 80 50 Z" transform="translate(20,15)" fill="none" stroke="#ccc" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
            <!-- Animazione colore non sbiadita che scorre sopra -->
            <path d="M 80 50 C 80 26, 56 14, 36 14 C 16 14, 6 30, 6 50 C 6 70, 16 86, 36 86 C 56 86, 80 74, 80 50 C 80 26, 104 14, 124 14 C 144 14, 154 30, 154 50 C 154 70, 144 86, 124 86 C 104 86, 80 74, 80 50 Z" transform="translate(20,15)" fill="none" stroke="url(#gl)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="600" stroke-dashoffset="600">
                <animate attributeName="stroke-dashoffset" values="600;0;0;-600" dur="6s" repeatCount="indefinite"/>
            </path>
        </svg>
    </div>
    <div class="side-symbol side-symbol-right">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" width="200" height="130">
            <defs>
                <linearGradient id="gr" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
                    <stop offset="0%" stop-color="#9C7E45"><animate attributeName="stop-color" values="#9C7E45;#C3ADE4;#CDB07E;#7E57A0;#9C7E45" dur="6s" repeatCount="indefinite"/></stop>
                    <stop offset="50%" stop-color="#7E57A0"><animate attributeName="stop-color" values="#7E57A0;#CDB07E;#9C7E45;#C3ADE4;#7E57A0" dur="6s" repeatCount="indefinite"/></stop>
                    <stop offset="100%" stop-color="#C3ADE4"><animate attributeName="stop-color" values="#C3ADE4;#9C7E45;#7E57A0;#CDB07E;#C3ADE4" dur="6s" repeatCount="indefinite"/></stop>
                </linearGradient>
            </defs>
            <!-- Favicon sbiadito statico -->
            <path d="M 80 50 C 80 26, 56 14, 36 14 C 16 14, 6 30, 6 50 C 6 70, 16 86, 36 86 C 56 86, 80 74, 80 50 C 80 26, 104 14, 124 14 C 144 14, 154 30, 154 50 C 154 70, 144 86, 124 86 C 104 86, 80 74, 80 50 Z" transform="translate(20,15)" fill="none" stroke="#ccc" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
            <!-- Animazione colore non sbiadita che scorre sopra -->
            <path d="M 80 50 C 80 26, 56 14, 36 14 C 16 14, 6 30, 6 50 C 6 70, 16 86, 36 86 C 56 86, 80 74, 80 50 C 80 26, 104 14, 124 14 C 144 14, 154 30, 154 50 C 154 70, 144 86, 124 86 C 104 86, 80 74, 80 50 Z" transform="translate(20,15)" fill="none" stroke="url(#gr)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="600" stroke-dashoffset="600">
                <animate attributeName="stroke-dashoffset" values="600;0;0;-600" dur="6s" repeatCount="indefinite"/>
            </path>
        </svg>
    </div>
    <div class="ambient">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="page">
        <!-- 1. Title + Badge -->
        <div class="top">
            <div class="badge">
                <span class="badge-dot"></span>
                Coming Soon
            </div>

            <h1 class="heading">
                <span class="word" style="animation-delay:0.2s">Be</span>
                <span class="word" style="animation-delay:0.28s">the</span>
                <span class="word" style="animation-delay:0.36s">first</span>
                <span class="word" style="animation-delay:0.44s">to</span><br>
                <span class="word" style="animation-delay:0.52s">experience</span>
                <span class="word loopi-text" style="animation-delay:0.62s">Loopi</span>
            </h1>
            <p class="subheading" id="subheading">Smart glasses that blend cutting-edge AI with iconic style.</p>
        </div>

        <!-- 2. 3D Carousel — center stage -->
        <div class="carousel-section">
            <div class="carousel-3d" id="carousel">
                <button class="carousel-nav nav-prev" id="nav-prev">
                    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <button class="carousel-nav nav-next" id="nav-next">
                    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
                </button>

                <div class="carousel-scene" id="scene">
                    <div class="carousel-item" data-index="0" data-name="Cognac" data-desc="Warm amber acetate">
                        <img src="loopi-cognac.png" alt="Loopi Cognac" draggable="false">
                    </div>
                    <div class="carousel-item" data-index="1" data-name="Lilac" data-desc="Soft violet crystal">
                        <img src="loopi-lilac.png" alt="Loopi Lilac" draggable="false">
                    </div>
                    <div class="carousel-item" data-index="2" data-name="Onyx" data-desc="Classic matte black">
                        <img src="loopi-onyx.png" alt="Loopi Onyx" draggable="false">
                    </div>
                    <div class="carousel-item" data-index="3" data-name="Tortoise" data-desc="Timeless havana pattern">
                        <img src="loopi-tortoise.png" alt="Loopi Tortoise" draggable="false">
                    </div>
                </div>
            </div>

            <div class="carousel-label">
                <p class="color-name" id="color-name">Cognac</p>
                <p class="color-desc" id="color-desc">Warm amber acetate</p>
            </div>

            <div class="swatches">
                <button class="swatch swatch-cognac active" data-index="0" aria-label="Cognac"></button>
                <button class="swatch swatch-lilac" data-index="1" aria-label="Lilac"></button>
                <button class="swatch swatch-onyx" data-index="2" aria-label="Onyx"></button>
                <button class="swatch swatch-tortoise" data-index="3" aria-label="Tortoise"></button>
            </div>
        </div>

        <!-- 3. Waitlist Form -->
        <div class="top" style="animation-delay: 0.4s;">
            <h2 class="heading" style="font-size: clamp(1.3rem, 2.5vw, 1.6rem);">Join the waitlist</h2>
            <p class="subheading" style="margin-bottom: 1.5rem;">Be first in line when we launch.</p>

            <div class="form-wrapper">
                <form id="waitlist-form">
                    <div class="input-group">
                        <input type="email" placeholder="Enter your email" required id="email-input">
                        <button type="submit" class="btn-join">Join Waitlist</button>
                    </div>
                    <p class="success-msg" id="success-msg">You're on the list. We'll be in touch soon.</p>
                </form>
            </div>
        </div>

        <!-- 4. Logo + Social — footer -->
        <div class="divider"></div>

        <img src="logo.svg" alt="Loopi" class="logo" style="margin-bottom: 0.4rem; margin-top: 6rem;">
        <p class="tagline" style="margin-bottom: 1.5rem;">Make habit reality.</p>

        <div class="socials">
            <a href="https://www.facebook.com/lisia.io/" class="social-link" aria-label="Facebook" target="_blank">
                <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </a>
            <a href="https://www.instagram.com/lisiasuperapp/" class="social-link" aria-label="Instagram" target="_blank">
                <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
            </a>
            <a href="https://www.linkedin.com/company/lisia/" class="social-link" aria-label="LinkedIn" target="_blank">
                <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </a>
        </div>

        <p class="footer-text">Loopi Inc.</p>
    </div>

    <script>
        // === LOOPI GRADIENT AFTER REVEAL ===
        setTimeout(function() {
            document.querySelector('.loopi-text').classList.add('gradient-active');
        }, 2500);

        // === SUBHEADING CHAR ANIMATION ===
        (function() {
            var el = document.getElementById('subheading');
            var text = el.textContent;
            el.textContent = '';
            var baseDelay = 0.8;
            for (var i = 0; i < text.length; i++) {
                var span = document.createElement('span');
                span.className = 'char';
                span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
                span.style.animationDelay = (baseDelay + i * 0.02) + 's';
                el.appendChild(span);
            }
        })();

        // === 3D CAROUSEL ===
        const items = document.querySelectorAll('.carousel-item');
        const swatches = document.querySelectorAll('.swatch');
        const colorName = document.getElementById('color-name');
        const colorDesc = document.getElementById('color-desc');
        const total = items.length;
        const angleStep = 360 / total;
        const radius = 350;
        let current = 0;
        let autoplayTimer;

        function positionItems(activeIndex) {
            current = activeIndex;
            items.forEach((item, i) => {
                const offset = ((i - activeIndex + total) % total);
                const angle = offset * angleStep;
                const rad = (angle * Math.PI) / 180;

                const x = Math.sin(rad) * radius;
                const z = Math.cos(rad) * radius - radius;
                const scale = 0.5 + 0.5 * ((z + radius) / radius);
                const opacity = i === activeIndex ? 1 : 0.4 + 0.3 * ((z + radius) / radius);

                item.style.transform = `translateX(${x}px) translateZ(${z}px) scale(${scale})`;
                item.style.opacity = opacity;
                item.style.zIndex = Math.round(scale * 10);
                item.classList.toggle('active', i === activeIndex);
            });

            swatches.forEach(s => s.classList.remove('active'));
            swatches[activeIndex].classList.add('active');
            colorName.textContent = items[activeIndex].dataset.name;
            colorDesc.textContent = items[activeIndex].dataset.desc;
        }

        function goTo(index) {
            positionItems(index);
            resetAutoplay();
        }

        // Init
        positionItems(0);

        // Swatches
        swatches.forEach(s => {
            s.addEventListener('click', () => goTo(parseInt(s.dataset.index)));
        });

        // Click on items
        items.forEach(item => {
            item.addEventListener('click', () => {
                const idx = parseInt(item.dataset.index);
                if (idx !== current) goTo(idx);
            });
        });

        // Nav arrows
        document.getElementById('nav-prev').addEventListener('click', () => {
            goTo((current - 1 + total) % total);
        });
        document.getElementById('nav-next').addEventListener('click', () => {
            goTo((current + 1) % total);
        });

        // Swipe
        const carousel = document.getElementById('carousel');
        let startX = 0, isDragging = false;

        carousel.addEventListener('pointerdown', e => {
            if (e.target.closest('.carousel-nav')) return;
            startX = e.clientX;
            isDragging = true;
        });
        carousel.addEventListener('pointerup', e => {
            if (!isDragging) return;
            isDragging = false;
            const diff = e.clientX - startX;
            if (Math.abs(diff) > 40) {
                diff < 0 ? goTo((current + 1) % total) : goTo((current - 1 + total) % total);
            }
        });

        // Keyboard
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') goTo((current + 1) % total);
            if (e.key === 'ArrowLeft') goTo((current - 1 + total) % total);
        });

        // Autoplay
        function resetAutoplay() {
            clearInterval(autoplayTimer);
            autoplayTimer = setInterval(() => {
                goTo((current + 1) % total);
            }, 4000);
        }
        resetAutoplay();
        carousel.addEventListener('pointerenter', () => clearInterval(autoplayTimer));
        carousel.addEventListener('pointerleave', resetAutoplay);

        // === FORM → Google Sheets ===
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwsJGX26kceX_RfkBunIGs4zJjm5SAwTbVrWRwccyiIx1a0rjikvNuTZ8g2BG5cPuCR/exec';

        document.getElementById('waitlist-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const emailInput = document.getElementById('email-input');
            const btn = document.querySelector('.btn-join');
            const email = emailInput.value;

            btn.textContent = 'Sending...';
            btn.disabled = true;

            var img = new Image();
            img.src = GOOGLE_SCRIPT_URL + '?email=' + encodeURIComponent(email);
            emailInput.value = '';
            btn.textContent = 'Join Waitlist';
            btn.disabled = false;
            document.getElementById('success-msg').classList.add('show');
            setTimeout(() => {
                document.getElementById('success-msg').classList.remove('show');
            }, 4000);
        });
    </script>
</body>
</html>
